name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# default least-privilege; the docker job elevates packages:write for itself only
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      # Runs in `test` so the `docker` job (needs: test) can never publish an image
      # whose tag disagrees with the code inside it.
      - name: Check git tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pkg=$(python -c "import netbox_monitor; print(netbox_monitor.__version__)")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::git tag v$tag does not match __version__ $pkg — bump src/netbox_monitor/__init__.py"
            exit 1
          fi
          echo "tag v$tag matches __version__ $pkg"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test
        run: pytest -v

  docker:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
