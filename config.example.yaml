# netbox-monitor v2 configuration.
#
# NOTE: since v2 the *live* configuration is data/settings.json, edited via the
# web UI (http://<host>:8899). This YAML is only imported on first start when no
# settings.json exists yet — handy for seeding a deployment. v1 flat configs
# (top-level technitium/proxmox/discovery) are migrated automatically.

netbox:
  url: https://netbox.example.com
  token: ${NETBOX_TOKEN}
  verify_ssl: true

# One entry per site: pairs a NetBox Site with its own Technitium instance,
# Proxmox instances, and scanning scope.
sites:
  - id: home
    name: Home
    netbox_site: home            # NetBox site slug (created if missing)
    technitium:
      url: http://10.200.11.2:5380
      token: ${TECHNITIUM_TOKEN}
    proxmox:
      - host: 10.200.11.91
        user: monitor@pve
        token_name: netbox-monitor
        token_value: ${PVE_TOKEN}
        verify_ssl: false
    discovery:
      enabled: true
      include_prefixes: []       # empty = all NetBox prefixes scoped to this site
      exclude_prefixes: []
    dhcp_enabled: true
    dns_enabled: true
    proxmox_enabled: true
  # - id: beach-house
  #   name: Beach House
  #   netbox_site: beach-house
  #   technitium: { url: "http://192.168.50.2:5380", token: ${BEACH_TECHNITIUM_TOKEN} }
  #   discovery: { include_prefixes: ["192.168.50.0/24"] }

# Global module settings (per-module polling intervals are editable in the web UI)
dhcp: { enabled: true, interval: 60 }
dns: { enabled: true, interval: 300 }
discovery: { enabled: true, interval: 900, concurrency: 128 }
availability: { enabled: true, interval: 60, stale_after: 600 }
proxmox_sync: { enabled: true, interval: 300 }
lldp: { enabled: false, interval: 1800 }
certs: { enabled: true, interval: 86400, expiring_days: 30 }

lifecycle:
  delete_dhcp_on_expiry: true
  stale_grace_delete_days: null

webui:
  enabled: true
  host: 0.0.0.0
  port: 8899
  # first visit asks you to set a password, or set WEBUI_PASSWORD in .env

dry_run: false
data_dir: data
log_level: INFO
