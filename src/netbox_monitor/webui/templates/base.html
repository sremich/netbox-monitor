<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}netbox-monitor{% endblock %}</title>
  <link rel="stylesheet" href="/static/pico.min.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <nav class="container">
    <ul>
      <li><strong>netbox-monitor</strong></li>
    </ul>
    <ul>
      <li><a href="/">Dashboard</a></li>
      <li><a href="/sites">Sites</a></li>
      <li><a href="/settings">Settings</a></li>
      <li><a href="/cleanup">Cleanup</a></li>
      <li><a href="/backup">Backup</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="container app-footer">
    <span>netbox-monitor v{{ version }}</span>
    <a href="{{ repo_url }}" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
      {# inline so the mark inherits currentColor and follows the theme #}
      <svg viewBox="0 0 16 16" width="15" height="15" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
                 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
                 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27
                 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
                 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01
                 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
  </footer>
  <script>
    // Render every server-emitted <time data-ts> in the VIEWER's timezone with a
    // relative age. The server clock (UTC in Docker) is not the user's clock, so a
    // fresh sync would otherwise look hours stale. Pure client-side, refreshed in
    // place so the "x ago" stays honest without reloading.
    (function () {
      function ago(seconds) {
        var s = Math.max(0, Math.round(seconds));
        if (s < 45) return "just now";
        var m = Math.round(s / 60);
        if (m < 60) return m + "m ago";
        var h = Math.round(m / 60);
        if (h < 24) return h + "h ago";
        return Math.round(h / 24) + "d ago";
      }
      function paint() {
        var now = Date.now() / 1000;
        document.querySelectorAll("time[data-ts]").forEach(function (el) {
          var ts = parseInt(el.getAttribute("data-ts"), 10);
          if (!ts) return;
          var d = new Date(ts * 1000);
          el.textContent = d.toLocaleTimeString() + " (" + ago(now - ts) + ")";
          el.title = d.toLocaleString();
        });
      }
      paint();
      setInterval(paint, 30000);
      document.body.addEventListener("htmx:afterSwap", paint);
    })();
  </script>
</body>
</html>
