# netbox-monitor — quick start:
#
#   docker compose up -d
#   → then open http://<this-host>:8899 and set a password on first visit.
#
# No .env or config.yaml is required. Everything is configured in the web UI and
# persisted in the named volume. (To pre-set the UI password or seed tokens,
# create a .env from .env.example — the optional env_file below is picked up
# automatically when present.)

services:
  netbox-monitor:
    image: ghcr.io/sremich/netbox-monitor:latest
    # to build from this checkout instead of pulling, run:
    #   docker compose build   (or add `build: .` here)
    restart: unless-stopped
    # host networking: ping discovery + ARP must sit on the real LAN, and it makes
    # the web UI reachable at http://<host>:8899 with no port mapping.
    network_mode: host
    cap_add:
      - NET_RAW # raw ICMP sockets for ping discovery
      - NET_ADMIN
    # optional — loaded only if a .env file exists (never fails a fresh start)
    env_file:
      - path: .env
        required: false
    volumes:
      - netbox-monitor-data:/app/data
      # optional seed config (otherwise configure everything in the web UI):
      # - ./config.yaml:/app/config.yaml:ro
      # optional netbox-secrets RSA key for LLDP per-device credentials:
      # - ./secrets_private_key.pem:/app/secrets_private_key.pem:ro
      # optional: restore an encrypted config export on first boot (see below)
      # - ./netbox-monitor-config.json:/app/restore.json:ro
    # the image has no curl; python is always there. Lives here rather than in the
    # Dockerfile because the port is configurable and --no-webui is supported.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8899/healthz', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  netbox-monitor-data:
